services:
  - type: web
    name: quickpush-api
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: cd web/backend && python run.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.siliconflow.cn/v1
      - key: FEISHU_APP_ID
        sync: false
      - key: FEISHU_APP_SECRET
        sync: false
      - key: FEISHU_RECEIVE_ID
        sync: false
      - key: FEISHU_RECEIVE_ID_TYPE
        value: chat_id
    healthCheckPath: /health
    autoDeploy: true
