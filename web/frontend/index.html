<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickPush - GitHub Trending 智能助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
            color: #E5E5E5;
            overflow: hidden;
            font-size: 13px;
            min-height: 100vh;
        }
        
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(123, 104, 238, 0.3);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(123, 104, 238, 0.5);
        }
        
        .app-container {
            height: 100vh;
            display: flex;
        }
        
        .sidebar {
            width: 260px;
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        
        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-align: center;
        }
        
        .logo-icon {
            width: 80px;
            height: 80px;
            position: relative;
        }
        
        .logo-icon svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 20px rgba(100, 150, 255, 0.4)) drop-shadow(0 0 40px rgba(180, 100, 255, 0.3));
        }
        
        .logo-text {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #4A90D9, #B46BFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }
        
        .sidebar-nav {
            padding: 16px 12px;
            flex: 1;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            margin-bottom: 4px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(74, 144, 217, 0.1), rgba(180, 107, 255, 0.1));
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .nav-item:hover {
            color: #E5E5E5;
            background: rgba(255, 255, 255, 0.03);
        }
        
        .nav-item:hover::before {
            opacity: 1;
        }
        
        .nav-item.active {
            background: linear-gradient(135deg, rgba(74, 144, 217, 0.2), rgba(180, 107, 255, 0.1));
            color: #7B68EE;
            border: 1px solid rgba(123, 104, 238, 0.3);
        }
        
        .nav-item svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }
        
        .main-content {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .main-header {
            padding: 20px 32px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(20, 20, 30, 0.5);
            backdrop-filter: blur(10px);
        }
        
        .page-title {
            font-size: 18px;
            font-weight: 600;
            color: #E5E5E5;
        }
        
        .page-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
        }
        
        .page {
            display: none;
        }
        
        .page.active {
            display: block;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: rgba(30, 30, 45, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            border-color: rgba(123, 104, 238, 0.3);
            box-shadow: 0 10px 40px rgba(123, 104, 238, 0.1);
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #4A90D9, #7B68EE, #B46BFF);
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #4A90D9, #7B68EE, #B46BFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        
        .stat-label {
            font-size: 13px;
            color: #666;
        }
        
        .category-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .category-card {
            background: rgba(30, 30, 45, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
        }
        
        .category-card:hover {
            border-color: rgba(255, 109, 90, 0.2);
        }
        
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .category-title {
            font-size: 16px;
            font-weight: 600;
            color: #E5E5E5;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .category-count {
            font-size: 12px;
            color: #666;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 20px;
        }
        
        .projects-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .project-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .project-item:hover {
            border-color: rgba(123, 104, 238, 0.3);
            background: rgba(123, 104, 238, 0.05);
            transform: translateX(4px);
        }
        
        .project-item.expanded {
            padding: 16px;
        }
        
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        
        .project-name {
            font-size: 14px;
            font-weight: 500;
            color: #E5E5E5;
            flex: 1;
            display: inline-block;
            cursor: pointer;
            padding: 2px 6px;
            margin: -2px -6px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        
        .project-name:hover {
            color: #7B68EE;
            background: rgba(123, 104, 238, 0.1);
        }
        
        .project-name a {
            color: inherit;
            text-decoration: none;
        }
        
        .project-name a:hover {
            color: #7B68EE;
        }
        
        .project-stars {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #7B68EE;
            font-weight: 500;
            font-size: 13px;
        }
        
        .project-details {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .project-item.expanded .project-details {
            display: block;
        }
        
        .project-summary {
            font-size: 13px;
            color: #888;
            line-height: 1.6;
            margin-bottom: 12px;
        }
        
        .project-reasons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }
        
        .reason-tag {
            font-size: 11px;
            padding: 4px 10px;
            background: rgba(123, 104, 238, 0.1);
            border: 1px solid rgba(123, 104, 238, 0.2);
            border-radius: 20px;
            color: #7B68EE;
        }
        
        .project-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #666;
        }
        
        .trends-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .chart-card {
            background: rgba(30, 30, 45, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
        }
        
        .chart-card.full-width {
            grid-column: 1 / -1;
        }
        
        .chart-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #E5E5E5;
        }
        
        .chart-container {
            position: relative;
            height: 250px;
        }
        
        .language-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .language-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .language-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        
        .language-info {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .language-name {
            font-size: 13px;
            color: #E5E5E5;
        }
        
        .language-count {
            font-size: 12px;
            color: #666;
        }
        
        .language-bar {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            overflow: hidden;
            margin-left: 12px;
        }
        
        .language-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s ease;
        }
        
        .ranking-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .ranking-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        
        .ranking-item:hover {
            background: rgba(123, 104, 238, 0.05);
            transform: translateX(4px);
        }
        
        .rank-number {
            font-size: 16px;
            font-weight: 700;
            width: 32px;
            text-align: center;
            flex-shrink: 0;
        }
        
        .rank-1 { color: #FFD700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        .rank-2 { color: #C0C0C0; text-shadow: 0 0 10px rgba(192, 192, 192, 0.5); }
        .rank-3 { color: #CD7F32; text-shadow: 0 0 10px rgba(205, 127, 50, 0.5); }
        .rank-other { color: #666; }
        
        .rank-content {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .rank-project {
            font-size: 14px;
            color: #E5E5E5;
            font-weight: 500;
        }
        
        .rank-stats {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .rank-badge {
            background: linear-gradient(135deg, #4A90D9, #7B68EE);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 140px);
            max-width: 800px;
            margin: 0 auto;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .chat-message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .chat-message.user {
            flex-direction: row-reverse;
        }
        
        .chat-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 16px;
        }
        
        .chat-message.assistant .chat-avatar {
            background: linear-gradient(135deg, #4A90D9, #7B68EE, #B46BFF);
            box-shadow: 0 4px 15px rgba(123, 104, 238, 0.3);
        }
        
        .chat-message.user .chat-avatar {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .chat-bubble {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 20px;
            line-height: 1.6;
        }
        
        .chat-message.assistant .chat-bubble {
            background: rgba(30, 30, 45, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom-left-radius: 6px;
        }
        
        .chat-message.user .chat-bubble {
            background: linear-gradient(135deg, #4A90D9, #7B68EE);
            color: white;
            border-bottom-right-radius: 6px;
            box-shadow: 0 4px 15px rgba(123, 104, 238, 0.3);
        }
        
        .chat-status {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #888;
            font-size: 13px;
            padding: 8px 0;
        }
        
        .chat-status .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(123, 104, 238, 0.2);
            border-top-color: #7B68EE;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .chat-referenced-projects {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .chat-referenced-projects-title {
            font-size: 12px;
            color: #666;
            margin-bottom: 12px;
        }
        
        .chat-project-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .chat-project-card:hover {
            border-color: rgba(123, 104, 238, 0.3);
            background: rgba(123, 104, 238, 0.05);
            transform: translateX(4px);
        }
        
        .chat-project-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        
        .chat-project-card-name {
            font-weight: 500;
            color: #E5E5E5;
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .chat-project-card-name:hover {
            color: #7B68EE;
        }
        
        .chat-project-card-similarity {
            font-size: 11px;
            color: #7B68EE;
            background: rgba(123, 104, 238, 0.1);
            padding: 3px 10px;
            border-radius: 20px;
        }
        
        .chat-project-card-summary {
            font-size: 12px;
            color: #888;
            line-height: 1.5;
        }
        
        .chat-input-container {
            padding: 24px;
            background: transparent;
        }
        
        .chat-input-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
            max-width: 700px;
            margin: 0 auto;
            background: rgba(30, 30, 45, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 6px 6px 6px 20px;
            transition: all 0.3s ease;
        }
        
        .chat-input-wrapper:focus-within {
            border-color: rgba(123, 104, 238, 0.5);
            box-shadow: 0 0 30px rgba(123, 104, 238, 0.15);
        }
        
        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            color: #E5E5E5;
            font-size: 14px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            resize: none;
            min-height: 24px;
            height: 24px;
            outline: none;
            line-height: 1.5;
            overflow: hidden;
        }
        
        .chat-input::placeholder {
            color: #555;
        }
        
        .chat-send-btn {
            background: linear-gradient(135deg, #4A90D9, #7B68EE);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(123, 104, 238, 0.3);
        }
        
        .chat-send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(123, 104, 238, 0.4);
        }
        
        .chat-send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .chat-welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: #888;
            padding: 20px;
        }
        
        .chat-welcome-icon {
            width: 120px;
            height: 120px;
            margin-bottom: 24px;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(100, 150, 255, 0.5)) drop-shadow(0 0 60px rgba(180, 100, 255, 0.3));
        }
        
        .chat-welcome-icon svg {
            width: 100%;
            height: 100%;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .chat-welcome-title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #4A90D9, #7B68EE, #B46BFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }
        
        .chat-welcome-desc {
            font-size: 14px;
            margin-bottom: 40px;
            max-width: 400px;
            line-height: 1.6;
            color: #666;
        }
        
        .chat-suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            max-width: 600px;
        }
        
        .chat-suggestion-btn {
            background: rgba(30, 30, 45, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #888;
            padding: 12px 20px;
            border-radius: 24px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        .chat-suggestion-btn:hover {
            border-color: rgba(123, 104, 238, 0.5);
            color: #E5E5E5;
            background: rgba(123, 104, 238, 0.1);
            transform: translateY(-2px);
        }
        
        .chat-content pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 16px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 10px 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .chat-content code {
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
        }
        
        .chat-content ul, .chat-content ol {
            margin: 10px 0;
            padding-left: 20px;
        }
        
        .chat-content li {
            margin: 6px 0;
        }
        
        .chat-content a {
            color: #7B68EE;
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .chat-content a:hover {
            text-decoration: underline;
        }
        
        .chat-content strong {
            color: #E5E5E5;
        }
        
        .chat-content p {
            margin: 10px 0;
        }
        
        @media (max-width: 1024px) {
            .sidebar {
                width: 200px;
            }
            
            .category-grid {
                grid-template-columns: 1fr;
            }
            
            .trends-grid {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#4A90D9"/>
                                    <stop offset="50%" style="stop-color:#7B68EE"/>
                                    <stop offset="100%" style="stop-color:#B46BFF"/>
                                </linearGradient>

    <script>
        const API_BASE = '/api';
        let categoryChart = null;
        let isStreaming = false;
        
        const pageTitles = {
            'chat': '聊天',
            'dashboard': '仪表盘',
            'trends': '趋势分析'
        };
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                const pageName = this.dataset.page;
                showPage(pageName);
            });
        });
        
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(a => a.classList.remove('active'));
            
            document.getElementById(`${pageName}-page`).classList.add('active');
            document.querySelector(`[data-page="${pageName}"]`).classList.add('active');
            
            document.getElementById('page-title').textContent = pageTitles[pageName];
            
            if (pageName === 'dashboard') {
                loadDashboard();
            } else if (pageName === 'trends') {
                loadTrends();
            } else if (pageName === 'chat') {
                document.getElementById('chat-input').focus();
            }
        }
        
        async function loadDashboard() {
            const container = document.getElementById('dashboard-content');
            
            try {
                const response = await fetch(`${API_BASE}/dashboard`);
                const data = await response.json();
                
                const categories = {
                    'ai_ecosystem': 'AI 生态',
                    'dev_tools': '开发工具',
                    'infrastructure': '基础设施',
                    'product_and_ui': '产品与 UI'
                };
                
                const totalProjects = Object.values(data).flat().length;
                
                let html = `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value">${totalProjects}</div>
                            <div class="stat-label">总项目数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${Object.keys(categories).filter(k => data[k] && data[k].length > 0).length}</div>
                            <div class="stat-label">活跃分类</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${data.ai_ecosystem ? data.ai_ecosystem.length : 0}</div>
                            <div class="stat-label">AI 项目</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${data.dev_tools ? data.dev_tools.length : 0}</div>
                            <div class="stat-label">开发工具</div>
                        </div>
                    </div>
                    
                    <div class="category-grid">
                `;
                
                for (const [key, title] of Object.entries(categories)) {
                    const projects = data[key];
                    if (projects && projects.length > 0) {
                        html += createCategoryCard(key, title, projects);
                    }
                }
                
                html += '</div>';
                
                container.innerHTML = html || '<div class="empty-state">暂无数据</div>';
            } catch (error) {
                container.innerHTML = `<div class="empty-state">加载失败: ${error.message}</div>`;
            }
        }
        
        function createCategoryCard(key, title, projects) {
            const count = projects.length;
            
            return `
                <div class="category-card">
                    <div class="category-header">
                        <div class="category-title">
                            ${title}
                            <span class="category-count">${count} 个项目</span>
                        </div>
                    </div>
                    <div class="projects-list">
                        ${projects.map((project, index) => createProjectItem(project, index, key)).join('')}
                    </div>
                </div>
            `;
        }
        
        function createProjectItem(project, index, categoryKey) {
            const stars = formatStars(project.stars);
            const reasons = project.reasons.slice(0, 3).map(r => `<span class="reason-tag">${r}</span>`).join('');
            
            return `
                <div class="project-item" onclick="toggleProject(this)">
                    <div class="project-header">
                        <span class="project-name" onclick="event.stopPropagation()">
                            <a href="${project.url}" target="_blank" style="color: inherit; text-decoration: none;">
                                ${project.repo_name}
                            </a>
                        </span>
                        <div class="project-stars">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                            </svg>
                            ${stars}
                        </div>
                    </div>
                    <div class="project-details">
                        <div class="project-summary">${project.summary}</div>
                        <div class="project-reasons">${reasons}</div>
                        <div class="project-meta">
                            <span>${project.language}</span>
                            <span>+${project.stars_today} 今日</span>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function toggleProject(element) {
            const isExpanded = element.classList.contains('expanded');
            
            document.querySelectorAll('.project-item.expanded').forEach(item => {
                item.classList.remove('expanded');
            });
            
            if (!isExpanded) {
                element.classList.add('expanded');
            }
        }
        
        function formatStars(stars) {
            if (stars >= 10000) {
                return (stars / 10000).toFixed(1) + '万';
            } else if (stars >= 1000) {
                return (stars / 1000).toFixed(1) + 'k';
            }
            return stars;
        }
        
        async function loadTrends() {
            const container = document.getElementById('trends-content');
            
            try {
                const response = await fetch(`${API_BASE}/trends?days=7`);
                const data = await response.json();
                
                const maxLanguageCount = Math.max(...data.language_trends.map(l => l.count));
                const languageColors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD', '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E9'];
                
                let html = `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value">${data.total_projects}</div>
                            <div class="stat-label">项目总数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${data.total_records}</div>
                            <div class="stat-label">记录总数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${data.category_trends.length}</div>
                            <div class="stat-label">分类数量</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${data.language_trends.length}</div>
                            <div class="stat-label">语言种类</div>
                        </div>
                    </div>
                    
                    <div class="trends-grid">
                        <div class="chart-card">
                            <div class="chart-title">分类趋势</div>
                            <div class="chart-container">
                                <canvas id="categoryChart"></canvas>
                            </div>
                        </div>
                        
                        <div class="chart-card">
                            <div class="chart-title">语言分布</div>
                            <div class="language-list">
                                ${data.language_trends.slice(0, 10).map((lang, index) => `
                                    <div class="language-item">
                                        <div class="language-color" style="background: ${languageColors[index % languageColors.length]}"></div>
                                        <div class="language-info">
                                            <span class="language-name">${lang.language}</span>
                                            <span class="language-count">${lang.count}</span>
                                        </div>
                                        <div class="language-bar">
                                            <div class="language-bar-fill" style="width: ${(lang.count / maxLanguageCount * 100)}%; background: ${languageColors[index % languageColors.length]}"></div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        
                        <div class="chart-card full-width">
                            <div class="chart-title">热门项目排行 TOP 10</div>
                            <div class="ranking-list">
                                ${data.hot_projects.slice(0, 10).map((proj, index) => `
                                    <div class="ranking-item">
                                        <div class="rank-number ${index < 3 ? 'rank-' + (index + 1) : 'rank-other'}">${index + 1}</div>
                                        <div class="rank-content">
                                            <span class="rank-project">${proj.repo_name}</span>
                                            <div class="rank-stats">
                                                <span class="rank-badge">${proj.appearances} 次</span>
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
                
                container.innerHTML = html;
                
                createCategoryChart(data);
            } catch (error) {
                container.innerHTML = `<div class="empty-state">加载失败: ${error.message}</div>`;
            }
        }
        
        function createCategoryChart(data) {
            if (categoryChart) categoryChart.destroy();
            
            const colors = ['#FF6D5A', '#FFB84D', '#4ECDC4', '#95E1D3', '#F38181'];
            
            const categoryCtx = document.getElementById('categoryChart').getContext('2d');
            categoryChart = new Chart(categoryCtx, {
                type: 'doughnut',
                data: {
                    labels: data.category_trends.map(c => getCategoryName(c.category)),
                    datasets: [{
                        data: data.category_trends.map(c => c.count),
                        backgroundColor: colors,
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                color: '#E5E5E5',
                                font: { size: 14, weight: '500' },
                                padding: 16
                            }
                        }
                    }
                }
            });
        }
        
        function getCategoryName(category) {
            const names = {
                'ai_ecosystem': 'AI 生态',
                'dev_tools': '开发工具',
                'infrastructure': '基础设施',
                'product_and_ui': '产品与 UI',
                'knowledge_base': '知识库',
                'unknown': '未分类'
            };
            return names[category] || category;
        }
        
        function handleChatKeydown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
        
        function sendSuggestion(text) {
            document.getElementById('chat-input').value = text;
            sendMessage();
        }
        
        function addMessage(role, content, projects = null) {
            const messagesContainer = document.getElementById('chat-messages');
            const welcome = document.getElementById('chat-welcome');
            if (welcome) {
                welcome.style.display = 'none';
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${role}`;
            
            const avatar = role === 'assistant' ? '🤖' : '👤';
            
            let projectsHtml = '';
            if (projects && projects.length > 0) {
                projectsHtml = `
                    <div class="chat-referenced-projects">
                        <div class="chat-referenced-projects-title">📚 参考项目</div>
                        ${projects.map(p => `
                            <div class="chat-project-card">
                                <div class="chat-project-card-header">
                                    <a class="chat-project-card-name" href="${p.url}" target="_blank">${p.repo_full_name}</a>
                                    <span class="chat-project-card-similarity">${p.similarity}% 相关</span>
                                </div>
                                <div class="chat-project-card-summary">${p.summary}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            
            messageDiv.innerHTML = `
                <div class="chat-avatar">${avatar}</div>
                <div class="chat-bubble">
                    <div class="chat-content">${content}</div>
                    ${projectsHtml}
                </div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            return messageDiv;
        }
        
        function addStatusMessage(content) {
            const messagesContainer = document.getElementById('chat-messages');
            
            const statusDiv = document.createElement('div');
            statusDiv.className = 'chat-status';
            statusDiv.id = 'chat-status';
            statusDiv.innerHTML = `
                <div class="spinner"></div>
                <span>${content}</span>
            `;
            
            messagesContainer.appendChild(statusDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            return statusDiv;
        }
        
        function updateStatusMessage(content) {
            const statusDiv = document.getElementById('chat-status');
            if (statusDiv) {
                statusDiv.querySelector('span').textContent = content;
            }
        }
        
        function removeStatusMessage() {
            const statusDiv = document.getElementById('chat-status');
            if (statusDiv) {
                statusDiv.remove();
            }
        }
        
        function formatContent(text) {
            if (!text) return '';
            return marked.parse(text);
        }
        
        async function sendMessage() {
            if (isStreaming) return;
            
            const input = document.getElementById('chat-input');
            const query = input.value.trim();
            
            if (!query) return;
            
            isStreaming = true;
            const sendBtn = document.getElementById('chat-send-btn');
            sendBtn.disabled = true;
            
            addMessage('user', query);
            input.value = '';
            
            addStatusMessage('正在思考...');
            
            let assistantMessage = null;
            let currentContent = '';
            let currentProjects = null;
            
            try {
                const response = await fetch(`${API_BASE}/chat/stream`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        query: query,
                        top_k: 3,
                        threshold: 0.5
                    })
                });
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                
                                if (data.type === 'status') {
                                    updateStatusMessage(data.content);
                                } else if (data.type === 'projects') {
                                    currentProjects = data.projects;
                                } else if (data.type === 'content_start') {
                                    removeStatusMessage();
                                    assistantMessage = addMessage('assistant', '');
                                } else if (data.type === 'content') {
                                    if (assistantMessage) {
                                        currentContent += data.content;
                                        const contentDiv = assistantMessage.querySelector('.chat-content');
                                        contentDiv.innerHTML = formatContent(currentContent);
                                        
                                        const messagesContainer = document.getElementById('chat-messages');
                                        messagesContainer.scrollTop = messagesContainer.scrollHeight;
                                    }
                                } else if (data.type === 'done') {
                                    if (assistantMessage && currentProjects) {
                                        const bubble = assistantMessage.querySelector('.chat-bubble');
                                        let projectsHtml = `
                                            <div class="chat-referenced-projects">
                                                <div class="chat-referenced-projects-title">📚 参考项目</div>
                                                ${currentProjects.map(p => `
                                                    <div class="chat-project-card">
                                                        <div class="chat-project-card-header">
                                                            <a class="chat-project-card-name" href="${p.url}" target="_blank">${p.repo_full_name}</a>
                                                            <span class="chat-project-card-similarity">${p.similarity}% 相关</span>
                                                        </div>
                                                        <div class="chat-project-card-summary">${p.summary}</div>
                                                    </div>
                                                `).join('')}
                                            </div>
                                        `;
                                        bubble.innerHTML = `
                                            <div class="chat-content">${formatContent(currentContent)}</div>
                                            ${projectsHtml}
                                        `;
                                    }
                                } else if (data.type === 'error') {
                                    removeStatusMessage();
                                    addMessage('assistant', `抱歉，出错了：${data.content}`);
                                }
                            } catch (e) {
                                console.error('Parse error:', e);
                            }
                        }
                    }
                }
            } catch (error) {
                removeStatusMessage();
                addMessage('assistant', `抱歉，网络出错了：${error.message}`);
            }
            
            isStreaming = false;
            sendBtn.disabled = false;
            input.focus();
        }
        
        document.getElementById('chat-input').focus();
    </script>
</body>
</html>
