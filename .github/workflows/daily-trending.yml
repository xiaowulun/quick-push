name: GitHub Trending Daily Push

# 触发条件
on:
  schedule:
    # UTC 时间的 0:00，相当于北京时间的早上 10:00
    - cron: '15 3 * * *'
  # 允许在 GitHub 网页端手动点击按钮触发（极其方便测试！）
  workflow_dispatch:

jobs:
  run-and-push:
    runs-on: ubuntu-latest
    
    # 【关键配置】赋予 Action 修改和推送代码的权限（为了保存数据库）
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # 自动缓存依赖，加快运行速度

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行主程序 (抓取 + LLM分析 + 飞书推送)
        # 将 GitHub Secrets 映射为环境变量，供你的 config.py 读取
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          GITHUB_TOKEN: ${{ secrets.PAT_GITHUB_TOKEN }} # 建议用这个名字区分
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_RECEIVE_ID: ${{ secrets.FEISHU_RECEIVE_ID }}
          FEISHU_RECEIVE_ID_TYPE: ${{ secrets.FEISHU_RECEIVE_ID_TYPE }}
        run: python main.py

      - name: 保存 SQLite 数据库并推回仓库
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update push history database"
          file_pattern: "*.db" # 只提交数据库文件，防止误传其他临时文件